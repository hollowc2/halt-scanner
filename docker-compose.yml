services:
  halt-scanner:
    build: .
    container_name: halt_scanner
    restart: unless-stopped
    environment:
      HOST: 0.0.0.0
      PORT: 8010
      DB_PATH: /data/halts.db
      POLL_SECONDS: 60
    ports:
      - "127.0.0.1:8010:8010"
    volumes:
      - halt_scanner_data:/data
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://127.0.0.1:8010/healthz', timeout=3)"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 20s

volumes:
  halt_scanner_data:
